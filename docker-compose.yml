version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: winwin-postgres
    restart: always
    environment:
      POSTGRES_DB: winwin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  auth-api:
    build:
      context: ./auth-api
    env_file:
      - .env
    container_name: auth-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      - postgres
    networks:
      - backend

  data-api:
    build:
      context: ./data-api
    env_file:
      - .env
    container_name: data-api
    ports:
      - "8081:8081"
    environment:
      INTERNAL_TOKEN: internal-secret
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pgdata: